<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GradeForge AI X — Your Personal AI Academic Operating System</title>
<meta name="description" content="GradeForge AI X — Track. Learn. Improve. Dominate. The AI-Powered Academic Operating System for Ambitious Students.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=4">
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;defs&gt;&lt;linearGradient id='g' x1='0' y1='0' x2='1' y2='1'&gt;&lt;stop offset='0' stop-color='%2335DDEF'/&gt;&lt;stop offset='1' stop-color='%238B7CF6'/&gt;&lt;/linearGradient&gt;&lt;/defs&gt;&lt;rect width='100' height='100' rx='24' fill='%23060B1A'/&gt;&lt;path d='M30 68 L50 28 L70 68 M38 54 H62' stroke='url(%23g)' stroke-width='9' stroke-linecap='round' stroke-linejoin='round' fill='none'/&gt;&lt;/svg&gt;">
</head>
<body>

<!-- ════════ ACCESS GATE ════════ -->
<div class="gate-screen" id="gate-screen" hidden>
  <div class="gate-aurora" aria-hidden="true"></div>
  <div class="gate-card">
    <div class="gate-logo">
      <svg viewBox="0 0 100 100" width="40" height="40">
        <defs><linearGradient id="gateGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#35DDEF"/><stop offset="1" stop-color="#8B7CF6"/>
        </linearGradient></defs>
        <path d="M30 68 L50 28 L70 68 M38 54 H62" stroke="url(#gateGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <h1 class="gate-title">GradeForge <span>AI&nbsp;X</span></h1>
    <p class="gate-sub">Your Personal AI Academic Operating System</p>
    <div class="gate-lockrow">🔒 Members access</div>
    <input id="gate-input" class="gate-input" type="text" placeholder="Enter your access code" autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="text" onkeydown="if(event.key==='Enter'){event.preventDefault();window.GFGATE&&GFGATE.unlock();}">
    <div id="gate-error" class="gate-error" style="display:none"></div>
    <button id="gate-btn" class="btn btn-primary gate-btn" type="button" onclick="window.GFGATE&&GFGATE.unlock()">Unlock GradeForge AI X</button>
    <p class="gate-foot">Your code came with your purchase confirmation.<br>Lost it? Message the seller and we’ll send it again. <span style="opacity:.5">· build 4</span></p>
  </div>
</div>

<!-- ════════ AURORA BACKGROUND ════════ -->
<div class="aurora" aria-hidden="true">
  <div class="aurora-blob ab-1"></div>
  <div class="aurora-blob ab-2"></div>
  <div class="aurora-blob ab-3"></div>
  <div class="grid-overlay"></div>
  <div class="stars"></div>
</div>

<div class="app-shell">

  <!-- ════════ SIDEBAR ════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 100 100" width="30" height="30">
          <defs><linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#35DDEF"/><stop offset="1" stop-color="#8B7CF6"/>
          </linearGradient></defs>
          <path d="M30 68 L50 28 L70 68 M38 54 H62" stroke="url(#brandGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">GradeForge</span>
        <span class="brand-sub">AI&nbsp;X &middot; Academic OS</span>
      </div>
    </div>

    <nav class="nav" id="nav">
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        <span>Command Center</span>
      </button>
      <button class="nav-item" data-view="marks">
        <svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4L22 7.92 20.59 6.5l-7.09 8-4-4L2 18l1.5.5z"/></svg>
        <span>Marks Center</span>
      </button>
      <button class="nav-item" data-view="assignments">
        <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        <span>Assignments</span>
      </button>
      <button class="nav-item" data-view="exams">
        <svg viewBox="0 0 24 24"><path d="M12 2L1 7l11 5 9-4.09V15h2V7L12 2zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
        <span>Exam Center</span>
      </button>
      <button class="nav-item" data-view="coach">
        <svg viewBox="0 0 24 24"><path d="M12 1a9 9 0 0 0-9 9c0 3.03 1.53 5.82 4 7.47V22l4-2h1a9 9 0 0 0 0-18zm-1 13H9v-2h2v2zm0-4H9V6h2v4zm4 4h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
        <span>AI Study Coach</span>
      </button>
      <button class="nav-item" data-view="focus">
        <svg viewBox="0 0 24 24"><path d="M12 20a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm0-18a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 5h-2v6l5.25 3.15.75-1.23-4-2.42V7z"/></svg>
        <span>Focus Engine</span>
      </button>
      <button class="nav-item" data-view="achievements">
        <svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 0 0 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
        <span>Achievements</span>
      </button>
      <button class="nav-item" data-view="university">
        <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
        <span>University Hub</span>
      </button>
      <button class="nav-item" data-view="settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/></svg>
        <span>Settings</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="level-card" id="sidebar-level"></div>
    </div>
  </aside>

  <!-- ════════ MAIN ════════ -->
  <div class="main-col">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div>
          <h1 class="greeting" id="greeting">Welcome back</h1>
          <p class="date-line" id="date-line"></p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="streak-chip" id="streak-chip" title="Study streak"></div>
        <div class="xp-chip" id="xp-chip"></div>
        <button class="btn btn-primary btn-quick" id="quick-add">
          <span class="plus">+</span> Quick Add
        </button>
      </div>
    </header>

    <main id="view-root" class="view-root"></main>
  </div>
</div>

<!-- ════════ MOBILE NAV ════════ -->
<nav class="mobile-nav" id="mobile-nav">
  <button data-view="dashboard" class="active"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg><span>Home</span></button>
  <button data-view="marks"><svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4L22 7.92 20.59 6.5l-7.09 8-4-4L2 18l1.5.5z"/></svg><span>Marks</span></button>
  <button data-view="exams"><svg viewBox="0 0 24 24"><path d="M12 2L1 7l11 5 9-4.09V15h2V7L12 2zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg><span>Exams</span></button>
  <button data-view="coach"><svg viewBox="0 0 24 24"><path d="M12 1a9 9 0 0 0-9 9c0 3.03 1.53 5.82 4 7.47V22l4-2h1a9 9 0 0 0 0-18z"/></svg><span>Coach</span></button>
  <button data-view="focus"><svg viewBox="0 0 24 24"><path d="M12 20a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm0-18a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 5h-2v6l5.25 3.15.75-1.23-4-2.42V7z"/></svg><span>Focus</span></button>
  <button onclick="GF.app.openMoreMenu()"><svg viewBox="0 0 24 24"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg><span>More</span></button>
</nav>

<!-- ════════ MODAL ════════ -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<!-- ════════ TOASTS / CONFETTI ════════ -->
<div class="toast-stack" id="toast-stack"></div>
<div class="confetti-layer" id="confetti-layer" aria-hidden="true"></div>

<script src="assets/gate.js?v=4"></script>
<script src="assets/data.js?v=4"></script>
<script src="assets/engine.js?v=4"></script>
<script src="assets/charts.js?v=4"></script>
<script src="assets/views.js?v=4"></script>
<script src="assets/app.js?v=4"></script>
</body>
</html>
